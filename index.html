<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Brillyant — learn probability by doing. Interactive dice simulations, instant feedback, and mastery tracking. (Totally original, not affiliated with anyone brilliant.)" />
    <meta name="theme-color" content="#6d28d9" />
    <!-- Warm up Firebase/Google connections before the JS needs them -->
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://securetoken.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://apis.google.com" />
    <title>Brillyant — Probability & Statistics</title>
    <script>
      // Apply the saved (or system) theme before paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem("chancelab-theme");
          if (t !== "light" && t !== "dark") {
            t =
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          }
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
